<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome to Serenade</title>
</head>
<body style="margin:0;background:#071115;color:#e6fffa;font-family:Arial,Helvetica,sans-serif;">
  <div style="max-width:560px;margin:0 auto;padding:32px 20px;">
    <div style="font-size:12px;letter-spacing:4px;text-transform:uppercase;color:#58e0c2;" th:text="${appName}">Serenade</div>
    <h1 style="font-size:28px;line-height:1.2;margin:24px 0 12px;">Welcome in, <span th:text="${username}">listener</span>.</h1>
    <p style="color:#a9c5c1;line-height:1.6;margin:0 0 24px;">
      Your account is verified. You can now listen, upload, build playlists, and tune Serenade to your room.
    </p>
  </div>
</body>
</html>
