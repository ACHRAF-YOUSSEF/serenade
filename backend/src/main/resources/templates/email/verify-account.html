<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify your account</title>
</head>
<body style="margin:0;background:#071115;color:#e6fffa;font-family:Arial,Helvetica,sans-serif;">
  <div style="max-width:560px;margin:0 auto;padding:32px 20px;">
    <div style="font-size:12px;letter-spacing:4px;text-transform:uppercase;color:#58e0c2;" th:text="${appName}">Serenade</div>
    <h1 style="font-size:28px;line-height:1.2;margin:24px 0 12px;">Confirm it's you</h1>
    <p style="color:#a9c5c1;line-height:1.6;margin:0 0 24px;">
      Hi <span th:text="${username}">listener</span>, enter this code in Serenade to verify your account.
    </p>
    <div style="background:#102129;border:1px solid #58e0c2;border-radius:14px;padding:24px;text-align:center;">
      <div style="font-size:40px;letter-spacing:14px;font-weight:700;color:#ffffff;" th:text="${code}">12345</div>
      <div style="margin-top:12px;color:#a9c5c1;font-size:14px;">
        Expires in <span th:text="${expiresMinutes}">10</span> minutes.
      </div>
    </div>
    <p style="color:#6f8f8a;font-size:13px;line-height:1.5;margin-top:24px;">
      If you did not create a Serenade account, you can ignore this email.
    </p>
  </div>
</body>
</html>
